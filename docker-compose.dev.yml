services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      TQ_API_URL: ${TQ_API_URL}
      TQ_API_KEY: ${TQ_API_KEY}
      TQ_API_SECRET: ${TQ_API_SECRET}
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
      - backend_prisma_generated:/app/prisma/generated
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/info-skjerm-2026
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      # Vite dev server proxies /api to the backend container — browser never needs to reach it directly
      VITE_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend/info-skjerm-2026:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data_dev:
  backend_node_modules:
  backend_prisma_generated:
  frontend_node_modules:
